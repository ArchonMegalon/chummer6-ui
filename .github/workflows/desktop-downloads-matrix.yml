name: Desktop Downloads Matrix

on:
  workflow_dispatch:
    inputs:
      deploy_portal_downloads:
        description: "Compatibility input only. Desktop builds now auto-deploy when a downloads target is configured."
        required: false
        default: true
        type: boolean
      publish_github_release:
        description: "Compatibility input only. Desktop builds now auto-sync the rolling GitHub release when the workflow runs."
        required: false
        default: true
        type: boolean
  push:
    branches:
      - Docker
    paths:
      - '.github/workflows/desktop-downloads-matrix.yml'
      - 'Chummer.Avalonia/**'
      - 'Chummer.Application/**'
      - 'Chummer.Blazor.Desktop/**'
      - 'Chummer.Blazor/**'
      - 'Chummer.Core/**'
      - 'Chummer.Rulesets.Sr5/**'
      - 'Chummer.Desktop.Runtime/**'
      - 'Chummer.Desktop.Installer/**'
      - 'Chummer.Infrastructure/**'
      - 'Chummer.Portal/**'
      - 'Chummer.Presentation/**'
      - 'Directory.Build.props'
      - 'global.json'
      - 'scripts/generate-releases-manifest.sh'
      - 'scripts/sync-github-release-assets.py'
      - 'scripts/build-desktop-installer.sh'
      - 'scripts/run-desktop-startup-smoke.sh'
      - 'scripts/publish-download-bundle.sh'
      - 'scripts/publish-download-bundle-s3.sh'
      - 'scripts/verify-releases-manifest.sh'
      - 'scripts/validate-amend-manifests.sh'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.app }} ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: r
    env:
      CHUMMER_LOCAL_CONTRACTS_PROJECT: ${{ github.workspace }}/c/Chummer.Contracts/Chummer.Contracts.csproj
      CHUMMER_LOCAL_CAMPAIGN_CONTRACTS_PROJECT: ${{ github.workspace }}/h/Chummer.Campaign.Contracts/Chummer.Campaign.Contracts.csproj
      CHUMMER_LOCAL_RUN_CONTRACTS_PROJECT: ${{ github.workspace }}/h/Chummer.Run.Contracts/Chummer.Run.Contracts.csproj
      CHUMMER_LOCAL_HUB_REGISTRY_CONTRACTS_PROJECT: ${{ github.workspace }}/g/Chummer.Hub.Registry.Contracts/Chummer.Hub.Registry.Contracts.csproj
      CHUMMER_LOCAL_UI_KIT_PROJECT: ${{ github.workspace }}/u/src/Chummer.Ui.Kit/Chummer.Ui.Kit.csproj
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: windows-latest
            rid: win-x64
            installer_ext: exe
            launch_target: Chummer.Avalonia.exe
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: windows-latest
            rid: win-arm64
            installer_ext: exe
            launch_target: Chummer.Avalonia.exe
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: ubuntu-latest
            rid: linux-x64
            installer_ext: deb
            launch_target: Chummer.Avalonia
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: ubuntu-latest
            rid: linux-arm64
            installer_ext: deb
            launch_target: Chummer.Avalonia
          - app: avalonia
            project: Chummer.Avalonia/Chummer.Avalonia.csproj
            os: macos-latest
            rid: osx-x64
            installer_ext: dmg
            launch_target: Chummer.Avalonia
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: r

      - name: Enable Windows long paths for compatibility checkouts
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          git config --system core.longpaths true

      - name: Checkout core-engine compatibility tree
        uses: actions/checkout@v4
        with:
          repository: ArchonMegalon/chummer6-core
          ref: fleet/core
          path: c

      - name: Checkout run-services compatibility tree
        uses: actions/checkout@v4
        with:
          repository: ArchonMegalon/chummer6-hub
          # fleet/hub currently omits Chummer.Campaign.Contracts, but the desktop
          # compatibility graph still needs both campaign and run contracts.
          ref: main
          path: h

      - name: Checkout hub-registry compatibility tree
        uses: actions/checkout@v4
        with:
          repository: ArchonMegalon/chummer6-hub-registry
          ref: fleet/hub-registry
          path: g

      - name: Checkout ui-kit compatibility tree
        uses: actions/checkout@v4
        with:
          repository: ArchonMegalon/chummer6-ui-kit
          ref: fleet/ui-kit
          path: u

      - name: Checkout media-factory compatibility tree
        uses: actions/checkout@v4
        with:
          repository: ArchonMegalon/chummer6-media-factory
          ref: fleet/media-factory
          path: m

      - name: Prepare compatibility tree aliases (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          $compatRoot = Split-Path -Parent $env:GITHUB_WORKSPACE
          New-Item -ItemType Junction -Path "${env:GITHUB_WORKSPACE}\\chummer-core-engine" -Target "${env:GITHUB_WORKSPACE}\\c" | Out-Null
          New-Item -ItemType Junction -Path "${env:GITHUB_WORKSPACE}\\chummer.run-services" -Target "${env:GITHUB_WORKSPACE}\\h" | Out-Null
          New-Item -ItemType Junction -Path "${env:GITHUB_WORKSPACE}\\chummer-hub-registry" -Target "${env:GITHUB_WORKSPACE}\\g" | Out-Null
          New-Item -ItemType Junction -Path "${env:GITHUB_WORKSPACE}\\chummer-ui-kit" -Target "${env:GITHUB_WORKSPACE}\\u" | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $compatRoot "fleet\\repos") -Force | Out-Null
          New-Item -ItemType Junction -Path (Join-Path $compatRoot "fleet\\repos\\chummer-media-factory") -Target "${env:GITHUB_WORKSPACE}\\m" | Out-Null

      - name: Prepare compatibility tree aliases (POSIX)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          compat_root="$(cd "$GITHUB_WORKSPACE/.." && pwd)"
          ln -sfn "$GITHUB_WORKSPACE/c" "$GITHUB_WORKSPACE/chummer-core-engine"
          ln -sfn "$GITHUB_WORKSPACE/h" "$GITHUB_WORKSPACE/chummer.run-services"
          ln -sfn "$GITHUB_WORKSPACE/g" "$GITHUB_WORKSPACE/chummer-hub-registry"
          ln -sfn "$GITHUB_WORKSPACE/u" "$GITHUB_WORKSPACE/chummer-ui-kit"
          mkdir -p "$compat_root/fleet/repos"
          ln -sfn "$GITHUB_WORKSPACE/m" "$compat_root/fleet/repos/chummer-media-factory"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build compatibility contracts
        shell: bash
        run: |
          set -euo pipefail
          dotnet build "${CHUMMER_LOCAL_CONTRACTS_PROJECT}" -c Release --nologo -p:UseChummerEngineContractsLocalFeed=false
          dotnet build "$GITHUB_WORKSPACE/m/src/Chummer.Media.Contracts/Chummer.Media.Contracts.csproj" -c Release --nologo
          dotnet build "${CHUMMER_LOCAL_CAMPAIGN_CONTRACTS_PROJECT}" -c Release --nologo
          dotnet build "${CHUMMER_LOCAL_RUN_CONTRACTS_PROJECT}" -c Release --nologo
          dotnet build "${CHUMMER_LOCAL_HUB_REGISTRY_CONTRACTS_PROJECT}" -c Release --nologo

      - name: Restore
        shell: bash
        run: |
          dotnet restore ${{ matrix.project }} \
            -r ${{ matrix.rid }} \
            -p:ChummerUseLocalCompatibilityTree=true \
            -p:UseChummerEngineContractsLocalFeed=false \
            -p:ChummerLocalContractsProject="${CHUMMER_LOCAL_CONTRACTS_PROJECT}" \
            -p:ChummerLocalCampaignContractsProject="${CHUMMER_LOCAL_CAMPAIGN_CONTRACTS_PROJECT}" \
            -p:ChummerLocalRunContractsProject="${CHUMMER_LOCAL_RUN_CONTRACTS_PROJECT}" \
            -p:ChummerLocalHubRegistryContractsProject="${CHUMMER_LOCAL_HUB_REGISTRY_CONTRACTS_PROJECT}" \
            -p:ChummerLocalUiKitProject="${CHUMMER_LOCAL_UI_KIT_PROJECT}"

      - name: Publish desktop app
        shell: bash
        run: |
          set -euo pipefail
          out_dir="out/${{ matrix.app }}/${{ matrix.rid }}"
          release_version="run-${GITHUB_RUN_NUMBER:-local}"
          dotnet publish "${{ matrix.project }}" \
            -c Release \
            -r "${{ matrix.rid }}" \
            --no-restore \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:ChummerUseLocalCompatibilityTree=true \
            -p:UseChummerEngineContractsLocalFeed=false \
            -p:ChummerLocalContractsProject="${CHUMMER_LOCAL_CONTRACTS_PROJECT}" \
            -p:ChummerLocalCampaignContractsProject="${CHUMMER_LOCAL_CAMPAIGN_CONTRACTS_PROJECT}" \
            -p:ChummerLocalRunContractsProject="${CHUMMER_LOCAL_RUN_CONTRACTS_PROJECT}" \
            -p:ChummerLocalHubRegistryContractsProject="${CHUMMER_LOCAL_HUB_REGISTRY_CONTRACTS_PROJECT}" \
            -p:ChummerLocalUiKitProject="${CHUMMER_LOCAL_UI_KIT_PROJECT}" \
            -p:ChummerDesktopReleaseVersion="$release_version" \
            -p:ChummerDesktopReleaseChannel="docker" \
            -o "$out_dir"

      - name: Package installer
        shell: bash
        run: |
          set -euo pipefail
          release_version="run-${GITHUB_RUN_NUMBER:-local}"
          bash scripts/build-desktop-installer.sh \
            "out/${{ matrix.app }}/${{ matrix.rid }}" \
            "${{ matrix.app }}" \
            "${{ matrix.rid }}" \
            "${{ matrix.launch_target }}" \
            "dist" \
            "$release_version"

      - name: Startup smoke
        shell: bash
        env:
          CHUMMER_DESKTOP_RELEASE_CHANNEL: docker
          CHUMMER_DESKTOP_RELEASE_VERSION: run-${GITHUB_RUN_NUMBER:-local}
          CHUMMER_DESKTOP_STARTUP_SMOKE_HOST_CLASS: github-actions-${{ matrix.os }}
        run: |
          set -euo pipefail
          mkdir -p dist/startup-smoke
          bash scripts/run-desktop-startup-smoke.sh \
            "dist/chummer-${{ matrix.app }}-${{ matrix.rid }}-installer.${{ matrix.installer_ext }}" \
            "${{ matrix.app }}" \
            "${{ matrix.rid }}" \
            "${{ matrix.launch_target }}" \
            "dist/startup-smoke" \
            "run-${GITHUB_RUN_NUMBER:-local}"

      - name: Upload RID artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.app }}-${{ matrix.rid }}
          path: |
            r/dist/chummer-${{ matrix.app }}-${{ matrix.rid }}-installer.${{ matrix.installer_ext }}
            r/dist/chummer-${{ matrix.app }}-${{ matrix.rid }}.exe
            r/dist/chummer-${{ matrix.app }}-${{ matrix.rid }}.zip
            r/dist/chummer-${{ matrix.app }}-${{ matrix.rid }}.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Upload startup smoke evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-${{ matrix.app }}-${{ matrix.rid }}
          path: r/dist/startup-smoke
          if-no-files-found: ignore
          retention-days: 14

  generate-manifest:
    name: Generate Downloads Manifest
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate amend manifests checksums
        run: bash scripts/validate-amend-manifests.sh

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: dist

      - name: Download startup smoke evidence
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-smoke-*
          merge-multiple: true
          path: dist/startup-smoke

      - name: Stage portal downloads directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/files
          shopt -s nullglob
          moved=0
          for artifact in dist/chummer-*.exe dist/chummer-*.zip dist/chummer-*.tar.gz dist/chummer-*-installer.deb dist/chummer-*-installer.pkg dist/chummer-*-installer.dmg dist/chummer-*-installer.msix; do
            [[ -f "$artifact" ]] || continue
            mv "$artifact" dist/files/
            moved=1
          done
          if [[ "$moved" -ne 1 ]]; then
            echo "No desktop artifacts were staged for manifest generation." >&2
            exit 1
          fi

      - name: Generate releases.json
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOWNLOADS_DIR="dist/files" \
          MANIFEST_PATH="dist/releases.json" \
          PORTAL_MANIFEST_PATH="dist/releases.json" \
          RELEASE_VERSION="run-${GITHUB_RUN_NUMBER:-local}" \
          RELEASE_CHANNEL="docker" \
          RELEASE_PUBLISHED_AT="${RELEASE_PUBLISHED_AT}" \
          bash scripts/generate-releases-manifest.sh

      - name: Upload manifest bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Desktop Download Bundle"
            echo
            echo "Generated manifest artifact: \`desktop-download-bundle\`"
            echo
            echo "Files:"
            find dist -maxdepth 2 -type f | sort | sed 's|^|- `|' | sed 's|$|`|'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-github-release:
    name: Publish Rolling GitHub Release
    needs: generate-manifest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      CHUMMER_GITHUB_RELEASE_REPO: ${{ vars.CHUMMER_GITHUB_RELEASE_REPO }}
      CHUMMER_GITHUB_RELEASE_TAG: ${{ vars.CHUMMER_GITHUB_RELEASE_TAG }}
      CHUMMER_GITHUB_RELEASE_TITLE: ${{ vars.CHUMMER_GITHUB_RELEASE_TITLE }}
      CHUMMER_GITHUB_RELEASE_TARGET_COMMITISH: ${{ github.sha }}
      CHUMMER_GITHUB_RELEASE_TOKEN: ${{ secrets.CHUMMER_GITHUB_RELEASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download manifest bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist

      - name: Publish rolling GitHub release assets
        shell: bash
        run: |
          set -euo pipefail
          release_repo="${CHUMMER_GITHUB_RELEASE_REPO:-${GITHUB_REPOSITORY}}"
          if [[ "$release_repo" != "${GITHUB_REPOSITORY}" && -z "${CHUMMER_GITHUB_RELEASE_TOKEN:-}" ]]; then
            echo "Cross-repo release publish requires CHUMMER_GITHUB_RELEASE_TOKEN." >&2
            exit 1
          fi
          if [[ -n "${CHUMMER_GITHUB_RELEASE_TOKEN:-}" ]]; then
            export GH_TOKEN="$CHUMMER_GITHUB_RELEASE_TOKEN"
          else
            export GH_TOKEN="$GITHUB_TOKEN"
          fi
          CHUMMER_GITHUB_RELEASE_REPO="$release_repo" \
          CHUMMER_GITHUB_RELEASE_BUNDLE_DIR="dist" \
          python3 scripts/sync-github-release-assets.py

      - name: Publish release summary
        shell: bash
        run: |
          set -euo pipefail
          release_repo="${CHUMMER_GITHUB_RELEASE_REPO:-${GITHUB_REPOSITORY}}"
          release_tag="${CHUMMER_GITHUB_RELEASE_TAG:-desktop-latest}"
          {
            echo "## Rolling GitHub Release"
            echo
            echo "- Repo: \`$release_repo\`"
            echo "- Tag: \`$release_tag\`"
            echo "- Bundle: \`desktop-download-bundle\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-downloads:
    name: Deploy Downloads Bundle
    needs: generate-manifest
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR != '' }}
    runs-on: ubuntu-latest
    env:
      CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR }}
      CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL }}
      CHUMMER_PORTAL_DOWNLOADS_DEPLOY_ENABLED: "true"
      CHUMMER_PORTAL_DOWNLOADS_REQUIRE_PUBLISHED_VERSION: "true"
      CHUMMER_PORTAL_DOWNLOADS_VERIFY_LINKS: "true"

    steps:
      - name: Validate deployment directory variable
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR}" ]]; then
            echo "Set repository variable CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR before enabling deploy_portal_downloads." >&2
            exit 1
          fi

      - name: Validate live verify URL
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL:-}" ]]; then
            echo "Set CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL to verify the live portal manifest after deployment." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download manifest bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist

      - name: Publish bundle to portal downloads directory
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/publish-download-bundle.sh dist "$CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR"

      - name: Verify deployed manifest has artifacts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify-releases-manifest.sh "$CHUMMER_PORTAL_DOWNLOADS_DEPLOY_DIR"

      - name: Verify deployed portal manifest has artifacts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify-releases-manifest.sh "$CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL"

  deploy-downloads-http:
    name: Deploy Downloads Bundle (HTTP Promote)
    needs: generate-manifest
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.CHUMMER_RELEASE_UPLOAD_URL != '' }}
    runs-on: ubuntu-latest
    env:
      CHUMMER_RELEASE_UPLOAD_URL: ${{ vars.CHUMMER_RELEASE_UPLOAD_URL }}
      CHUMMER_RELEASE_UPLOAD_TOKEN: ${{ secrets.CHUMMER_RELEASE_UPLOAD_TOKEN }}
      CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL }}

    steps:
      - name: Download manifest bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist

      - name: Validate upload variables
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${CHUMMER_RELEASE_UPLOAD_URL:-}" ]] || { echo "CHUMMER_RELEASE_UPLOAD_URL is required." >&2; exit 1; }
          [[ -n "${CHUMMER_RELEASE_UPLOAD_TOKEN:-}" ]] || { echo "CHUMMER_RELEASE_UPLOAD_TOKEN is required." >&2; exit 1; }

      - name: Upload release bundle to chummer.run
        shell: bash
        run: |
          set -euo pipefail
          bundle_zip="$(mktemp --suffix=.zip)"
          (
            cd dist
            zip -qry "$bundle_zip" .
          )
          curl --fail-with-body -sS \
            -X POST \
            -H "Authorization: Bearer ${CHUMMER_RELEASE_UPLOAD_TOKEN}" \
            -F "bundle=@${bundle_zip};type=application/zip" \
            "${CHUMMER_RELEASE_UPLOAD_URL}" \
            | tee release-upload-response.json

      - name: Verify live promoted manifest
        if: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify-releases-manifest.sh "${CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL}"

  deploy-downloads-object-storage:
    name: Deploy Downloads Bundle (Object Storage)
    needs: generate-manifest
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.CHUMMER_PORTAL_DOWNLOADS_S3_URI != '' }}
    runs-on: ubuntu-latest
    env:
      CHUMMER_PORTAL_DOWNLOADS_S3_URI: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_S3_URI }}
      CHUMMER_PORTAL_DOWNLOADS_S3_LATEST_URI: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_S3_LATEST_URI }}
      CHUMMER_PORTAL_DOWNLOADS_S3_ENDPOINT_URL: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_S3_ENDPOINT_URL }}
      CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL }}
      CHUMMER_PORTAL_DOWNLOADS_VERIFY_LINKS: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.CHUMMER_PORTAL_DOWNLOADS_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CHUMMER_PORTAL_DOWNLOADS_AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.CHUMMER_PORTAL_DOWNLOADS_AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: ${{ vars.CHUMMER_PORTAL_DOWNLOADS_S3_REGION }}

    steps:
      - name: Validate object-storage variables
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CHUMMER_PORTAL_DOWNLOADS_S3_URI:-}" ]]; then
            echo "Set repository variable CHUMMER_PORTAL_DOWNLOADS_S3_URI to enable object-storage deploy mode." >&2
            exit 1
          fi
          if [[ -z "${CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL:-}" ]]; then
            echo "Set CHUMMER_PORTAL_DOWNLOADS_VERIFY_URL to verify the live portal manifest after object-storage deployment." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download manifest bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-download-bundle
          path: dist

      - name: Publish bundle to object storage
        shell: bash
        run: |
          set -euo pipefail
          export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-us-east-1}"
          bash scripts/publish-download-bundle-s3.sh dist
