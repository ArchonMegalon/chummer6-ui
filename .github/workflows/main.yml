name: Release Notification

on:
  release:
    types: [created]

permissions:
  contents: read

concurrency:
  group: release-notification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Discord notification
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        run: |
          set -euo pipefail
          payload='{"content":"A new build has been released: https://get.chummer.net"}'
          curl -fsSL -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"
