<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chummer Avalonia Browser Host</title>
    <style>
      :root { --ink: #e9f1fa; --muted: #b6c3d1; --card: #122236; --line: #2f4a66; --accent: #ef8e2f; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: "Aptos", "Segoe UI", sans-serif; color: var(--ink); background: radial-gradient(circle at 10% 10%, #20344b, #0c1a2a 60%); }
      main { width: min(840px, 100%); background: rgba(18, 34, 54, 0.94); border: 1px solid var(--line); border-radius: 16px; padding: 24px; box-shadow: 0 20px 46px rgba(0, 0, 0, 0.34); }
      h1 { margin: 0 0 10px; font-size: clamp(1.4rem, 3vw, 2rem); }
      p { margin: 8px 0; color: var(--muted); line-height: 1.5; }
      code { color: #ffdcb8; }
      .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
      a { display: inline-block; text-decoration: none; color: #07121c; background: var(--accent); border-radius: 999px; padding: 9px 13px; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>Avalonia Browser Host</h1>
      <p>This service is the dedicated browser entry head for <code>/avalonia/</code> behind the portal.</p>
      <p>It currently serves scaffold content until published Avalonia browser artifacts are wired in.</p>
      <div class="actions">
        <a href="/downloads/">Desktop Downloads</a>
        <a href="/blazor/">Open Blazor</a>
      </div>
    </main>
  </body>
</html>
